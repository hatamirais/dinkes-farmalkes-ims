name: Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-versioning:
    name: Verify version command and tests
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-release-placeholder-secret
      DEBUG: "False"
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app_version output equals VERSION file
        shell: bash
        run: |
          COMMAND_VERSION=$(python manage.py app_version)
          FILE_VERSION=$(cat ../VERSION | tr -d '\r\n')

          if [ "$COMMAND_VERSION" != "$FILE_VERSION" ]; then
            echo "Mismatch: app_version returned '$COMMAND_VERSION' but VERSION is '$FILE_VERSION'"
            exit 1
          fi

      - name: Run core versioning tests
        run: python manage.py test apps.core.tests

  release:
    name: Create tag and release
    runs-on: ubuntu-latest
    needs: verify-versioning
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version file
        id: version
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '\r\n')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tag_check
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
